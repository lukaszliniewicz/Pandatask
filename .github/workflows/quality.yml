name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm audit

  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer phpcs
      - run: composer phpstan
      - run: php tests/security-policy.php
      - run: composer audit
